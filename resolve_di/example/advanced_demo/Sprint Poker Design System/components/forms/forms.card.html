<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<div id="root" style="background:var(--bg-canvas);padding:20px"></div>
<script type="text/babel">
const {Button,IconButton,Input,Select,Checkbox,Switch}=window.SprintPokerDesignSystem_1cc025;
function Demo(){
const [name,setName]=React.useState('');
const [deck,setDeck]=React.useState('fib');
const [check,setCheck]=React.useState(true);
const [sw,setSw]=React.useState(false);
return <div style={{display:'flex',flexDirection:'column',gap:16,fontFamily:'var(--font-sans)'}}>

</div>
<div style={{display:'flex',gap:20}}>
