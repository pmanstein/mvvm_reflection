<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="success / danger / warning / info — never decorative" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;height:150px;gap:0;font-family:var(--font-sans);font-size:13px">
<div style="flex:1;background:var(--gray-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
<div style="width:40px;height:40px;border-radius:50%;background:var(--success)"></div><div style="color:var(--text-secondary)">Success</div></div>
<div style="flex:1;background:var(--gray-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
<div style="width:40px;height:40px;border-radius:50%;background:var(--danger)"></div><div style="color:var(--text-secondary)">Danger</div></div>
<div style="flex:1;background:var(--gray-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
<div style="width:40px;height:40px;border-radius:50%;background:var(--warning)"></div><div style="color:var(--text-secondary)">Warning</div></div>
<div style="flex:1;background:var(--gray-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
<div style="width:40px;height:40px;border-radius:50%;background:var(--info)"></div><div style="color:var(--text-secondary)">Info</div></div>
</div>
